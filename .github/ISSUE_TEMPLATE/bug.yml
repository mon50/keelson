name: Bug Report
description: Create a report to help us improve Reforge
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Environment
      description: Node version, OS, Agent (Claude Code / Codex)
    validations:
      required: true
